<!DOCTYPE html>
<!-- saved from url=(0055)file:///Users/rubicubo/Downloads/revozen-agentes_1.html -->
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revozen — Lista de Agentes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    margin: 0;
    padding: 0;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 28px 32px 32px;
    width: 100%;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .header-icon {
    width: 32px;
    height: 32px;
    background: #111;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .header-title {
    font-size: 16px;
    font-weight: 600;
    color: #111;
  }
  .header-badge {
    font-size: 13px;
    color: #666;
    margin-left: 4px;
    font-weight: 400;
  }
  .header-sub {
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
    margin-left: 42px;
  }

  /* Grid de agentes */
  .agents-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .agent-card {
    background: #f5f5f7;
    border-radius: 12px;
    padding: 20px 16px 18px;
    cursor: pointer;
    transition: all 0.15s;
    border: 2px solid transparent;
    position: relative;
  }
  .agent-card:hover {
    background: #eef0f5;
  }
  .agent-card.selected {
    background: #eef4ff;
    border-color: #4f7cff;
  }
  .agent-card.selected::after {
    content: '✓';
    position: absolute;
    top: 10px;
    right: 12px;
    width: 18px;
    height: 18px;
    background: #4f7cff;
    border-radius: 50%;
    color: white;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    line-height: 18px;
    text-align: center;
  }

  .agent-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
  }

  .agent-name {
    font-size: 14px;
    font-weight: 600;
    color: #111;
    line-height: 1.3;
  }

  /* Colores por agente */
  .icon-blue   { background: #e8eeff; }
  .icon-green  { background: #e6f9f0; }
  .icon-orange { background: #fff3e8; }
  .icon-purple { background: #f0eaff; }

  /* Botones */
  .actions {
    display: flex;
    gap: 10px;
  }
  .btn-primary {
    padding: 9px 22px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-secondary {
    padding: 9px 18px;
    background: #fff;
    color: #111;
    border: 1.5px solid #d0d0d0;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
  }
  .btn-secondary::after {
    content: '▾';
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="2" width="6" height="6" rx="1.5" fill="white" opacity="0.9"></rect>
        <rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" opacity="0.6"></rect>
        <rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" opacity="0.6"></rect>
        <rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity="0.3"></rect>
      </svg>
    </div>
    <span class="header-title">Lista de Agentes</span>
    <span class="header-badge">4 agentes disponibles</span>
  </div>
  <div class="header-sub">Elige los agentes de Revenue Agentic AI para tu empresa</div>

  <!-- Grid -->
  <div class="agents-grid">

    <!-- Agente 1: Captura y calificación -->
    <div class="agent-card selected" onclick="toggle(this)">
      <div class="agent-icon icon-blue">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <!-- Imán simplificado = captura -->
          <path d="M4 6C4 3.79 5.79 2 8 2h1v4H8a2 2 0 0 0-2 2v2a6 6 0 0 0 12 0V8a2 2 0 0 0-2-2h-1V2h1c2.21 0 4 1.79 4 4v4a9 9 0 0 1-18 0V6z" fill="#4f7cff" fill-opacity="0.15" stroke="#4f7cff" stroke-width="1.4"></path>
          <path d="M9 2h4" stroke="#4f7cff" stroke-width="1.8" stroke-linecap="round"></path>
        </svg>
      </div>
      <div class="agent-name">Captura y calificación</div>
    </div>

    <!-- Agente 2: Seguimiento autónomo -->
    <div class="agent-card selected" onclick="toggle(this)">
      <div class="agent-icon icon-green">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <!-- Flecha circular = seguimiento -->
          <path d="M11 3a8 8 0 0 1 7.66 5.7" stroke="#22c364" stroke-width="1.6" stroke-linecap="round"></path>
          <path d="M19 11a8 8 0 1 1-8-8" stroke="#22c364" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="2 2"></path>
          <path d="M16.5 5.5L19.2 8.8 21 5" stroke="#22c364" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
          <!-- Tick central -->
          <path d="M7.5 11l2.5 2.5 4.5-5" stroke="#22c364" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
      <div class="agent-name">Seguimiento autónomo</div>
    </div>

    <!-- Agente 3: Nurturing -->
    <div class="agent-card" onclick="toggle(this)">
      <div class="agent-icon icon-orange">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <!-- Planta/crecimiento = nurturing -->
          <path d="M11 19V10" stroke="#f59e0b" stroke-width="1.6" stroke-linecap="round"></path>
          <path d="M11 14C11 14 8 12 5 13.5" stroke="#f59e0b" stroke-width="1.4" stroke-linecap="round"></path>
          <path d="M11 11C11 11 14 9 17 10.5" stroke="#f59e0b" stroke-width="1.4" stroke-linecap="round"></path>
          <path d="M11 10C11 7 9 4 6 3c0 3 1.5 5.5 5 7z" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.3"></path>
          <path d="M11 10C11 7 13 4 16 3c0 3-1.5 5.5-5 7z" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.3"></path>
          <path d="M8 19h6" stroke="#f59e0b" stroke-width="1.6" stroke-linecap="round"></path>
        </svg>
      </div>
      <div class="agent-name">Nurturing de oportunidades</div>
    </div>

    <!-- Agente 4: Cierre y propuesta -->
    <div class="agent-card" onclick="toggle(this)">
      <div class="agent-icon icon-purple">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <!-- Documento con check = propuesta/cierre -->
          <rect x="4" y="2" width="11" height="15" rx="2" fill="#9b7bf7" fill-opacity="0.12" stroke="#9b7bf7" stroke-width="1.4"></rect>
          <path d="M7 7h5M7 10h5M7 13h3" stroke="#9b7bf7" stroke-width="1.3" stroke-linecap="round"></path>
          <circle cx="16" cy="16" r="4.5" fill="#9b7bf7" fill-opacity="0.15" stroke="#9b7bf7" stroke-width="1.4"></circle>
          <path d="M14 16l1.5 1.5L18 14" stroke="#9b7bf7" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
      <div class="agent-name">Cierre y propuesta</div>
    </div>

  </div>

  <!-- Acciones -->
  <div class="actions">
    <button class="btn-primary">Continuar</button>
    <button class="btn-secondary">Modificar</button>
  </div>

</div>

<script>
function toggle(card) {
  card.classList.toggle('selected');
  const count = document.querySelectorAll('.agent-card.selected').length;
  document.querySelector('.header-badge').textContent = count + ' agente' + (count !== 1 ? 's' : '') + ' seleccionado' + (count !== 1 ? 's' : '');
}
</script>


</body></html>
